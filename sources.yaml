# Hotspot sources.
#
# Beginner-friendly default:
# The workflow requests this URL for each source:
# https://uapis.cn/api/v1/misc/hotboard?type={id}
#
# Later, if you self-host DailyHotApi, you can switch url_template to:
# "http://127.0.0.1:6688/{id}"
url_template: "https://uapis.cn/api/v1/misc/hotboard?type={id}"
top_n_per_source: 20
timeout_seconds: 20

sources:
  - id: weibo
    name: 微博热搜
    category: 社交
  - id: zhihu
    name: 知乎热榜
    category: 社区
