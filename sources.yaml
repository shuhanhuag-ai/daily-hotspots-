    name: 百度热搜
    category: 搜索
  - id: bilibili
    name: B站热门
    category: 视频
  - id: douyin
    name: 抖音热点
    category: 短视频
  - id: toutiao
    name: 今日头条
    category: 资讯
  - id: thepaper
    name: 澎湃新闻
    category: 新闻
  - id: ithome
    name: IT之家
    category: 科技
  - id: juejin
    name: 稀土掘金
